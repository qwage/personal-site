[project]
site_name = "Living Resume"
site_description = "Quinn Joyce's personal resume website"
site_author = "Quinn Joyce"
repo_url = "https://github.com/qwage/personal-site"
copyright = """
Copyright &copy; 2026 Quinn Joyce
"""

nav = [
    { "Home" = "index.md" },
    { "Education" = [
        { "Bachelor of Science" = "education/bs.md" },
        { "Master of Science" = "education/ms.md" },
        { "Continued Education" = "education/continued_ed.md" },
    ] },
    { "Projects" = [
        { "Covid Squid" = "projects/covid_squid.md" },
        { "Wheels-Up" = "projects/wheels_up.md" },
        { "Guitar Pedal Board" = "projects/guitar_pedal_board.md" },
    ] },
    { "Work Experience" = [
        { "High School" = "work_experience/high_school.md" },
        { "American Airlines" = "work_experience/american_airlines.md" },
        { "Boeing" = "work_experience/boeing.md" },
        { "Purdue" = "work_experience/purdue.md" }
    ] }
]

# ----------------------------------------------------------------------------
# Section for configuring theme options
# ----------------------------------------------------------------------------

variant = "classic"
language = "en"

features = [
    "announce.dismiss",
    "content.action.edit",
    "content.code.annotate",
    "content.code.copy",
    "content.code.select",
    "content.footnote.tooltips",
    "content.tabs.link",
    "content.tooltips",
    "navigation.footer",
    "navigation.indexes",
    "navigation.instant",
    "navigation.instant.prefetch",
    "navigation.instant.progress",
    "navigation.path",
    "navigation.sections",
    "navigation.top",
    "navigation.tracking",
    "search.highlight",
]

# ----------------------------------------------------------------------------
# In the "palette" subsection you can configure options for the color scheme.
# You can configure different color # schemes, e.g., to turn on dark mode,
# that the user can switch between. Each color scheme can be further
# customized.
#
# Read more:
# - https://zensical.org/docs/setup/colors/
# ----------------------------------------------------------------------------
[[project.theme.palette]]
scheme = "default"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
scheme = "slate"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"

# ----------------------------------------------------------------------------
# In the "font" subsection you can configure the fonts used. By default, fonts
# are loaded from Google Fonts, giving you a wide range of choices from a set
# of suitably licensed fonts. There are options for a normal text font and for
# a monospaced font used in code blocks.
# ----------------------------------------------------------------------------
[project.theme.font]
text = "Inter"
code = "Jetbrains Mono"

# ----------------------------------------------------------------------------
# You can configure your own logo to be shown in the header using the "logo"
# option in the "icons" subsection. The logo can be a path to a file in your
# "docs_dir" or it can be a path to an icon.
#
# Likewise, you can customize the logo used for the repository section of the
# header. Zensical derives the default logo for this from the repository URL.
# See below...
#
# There are other icons you can customize. See the documentation for details.
#
# Read more:
# - https://zensical.org/docs/setup/logo-and-icons
# - https://zensical.org/docs/authoring/icons-emojis/#search
# ----------------------------------------------------------------------------
[project.theme.icon]
logo = "lucide/rocket"
repo = "material/github"

# ----------------------------------------------------------------------------
# The "extra" section contains miscellaneous settings.
# ----------------------------------------------------------------------------
[[project.extra.social]]
icon = "fontawesome/brands/github"
link = "https://github.com/qwage"
name = "GitHub"

[[project.extra.social]]
icon = "fontawesome/brands/linkedin"
link = "https://www.linkedin.com/in/quinn-joyce-241b0b126/"
name = "LinkedIn"

[[project.extra.social]]
icon = "fontawesome/brands/facebook"
link = "https://www.facebook.com/Qwage"
name = "Facebook"

[[project.extra.social]]
icon = "fontawesome/brands/discord"
link = "https://discord.com/users/qwage"
name = "Discord"

[[project.extra.social]]
icon = "simple/youtube"
link = "https://www.youtube.com/@Qwage"
name = "YouTube Chanel"

[[project.extra.social]]
icon = "material/radar"
link = "https://my.flightradar24.com/Qwage"
name = "My Flight Radar tracks!"